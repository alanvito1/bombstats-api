name: BombStats API CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: dbsenha
          POSTGRES_DB: bombstats_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Security Audit
      run: npm run security:audit

    - name: Run Linter
      run: npm run lint

    - name: Build
      run: npm run build

    - name: Run Tests (Smoke)
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USER: root
        DB_PASSWORD: dbsenha
        DB_NAME: bombstats_test
        REDIS_HOST: localhost
        REDIS_PORT: 6379
      run: npm run test:e2e
